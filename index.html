<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Produ — Gestión de Productoras" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Produ" />
    <title>Bienvenido a Produ</title>
  </head>
  <body>
    <div id="root"></div>
    <script
      src='//fw-cdn.com/16062405/7053033.js'
      chat='true'>
    </script>
    <script>
      (function(){
        const selectors = [
          '#fc_frame',
          '#fc_widget',
          'iframe#fc_frame',
          'iframe#fc_widget',
          '[id^="fc_frame"]',
          '[id^="fc_widget"]'
        ];
        const cleanFreshdeskLauncher = () => {
          selectors.forEach((selector) => {
            document.querySelectorAll(selector).forEach((node) => {
              if (!(node instanceof HTMLElement)) return;
              const rect = node.getBoundingClientRect();
              const isLauncher = rect.width > 0 && rect.width <= 96 && rect.height > 0 && rect.height <= 96;
              if (!isLauncher) return;
              [node, node.parentElement, node.parentElement && node.parentElement.parentElement]
                .filter(Boolean)
                .forEach((el) => {
                  try {
                    el.style.setProperty('background', 'transparent', 'important');
                    el.style.setProperty('background-color', 'transparent', 'important');
                    el.style.setProperty('border', '0', 'important');
                    el.style.setProperty('box-shadow', 'none', 'important');
                  } catch {}
                });
              [node.parentElement, node.parentElement && node.parentElement.parentElement]
                .filter(Boolean)
                .forEach((el) => {
                  try {
                    el.style.setProperty('border-radius', '999px', 'important');
                    el.style.setProperty('overflow', 'hidden', 'important');
                  } catch {}
                });
            });
          });
        };
        const startFreshdeskCleanup = () => {
          cleanFreshdeskLauncher();
          const obs = new MutationObserver(() => cleanFreshdeskLauncher());
          obs.observe(document.documentElement, { childList: true, subtree: true, attributes: true, attributeFilter: ['style', 'class'] });
        };
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', startFreshdeskCleanup, { once: true });
        } else {
          startFreshdeskCleanup();
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
