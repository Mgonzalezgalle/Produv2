<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Produ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --cyan:#11c9ff;
      --cyan-2:#0c86d8;
      --ink:#0b1730;
      --muted:#6f8198;
      --white:#ffffff;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:transparent;font-family:"Manrope",sans-serif}
    body{padding:48px;display:grid;gap:36px;justify-content:start}
    .artboard{
      width:max-content;
      padding:28px 34px;
      border-radius:32px;
      background:transparent;
    }
    .lockup{
      display:flex;
      align-items:center;
      gap:18px;
    }
    .icon{
      width:84px;
      height:84px;
      border-radius:24px;
      background:linear-gradient(135deg,var(--cyan),var(--cyan-2));
      position:relative;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.22),
        0 14px 34px rgba(17,201,255,.24);
      flex-shrink:0;
    }
    .icon::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.16);
    }
    .icon svg{
      position:absolute;
      inset:0;
      margin:auto;
      width:34px;
      height:34px;
      transform:translateX(2px);
      filter:drop-shadow(0 4px 10px rgba(3,17,36,.18));
    }
    .text{
      display:grid;
      gap:2px;
    }
    .wordmark{
      font-family:"Syne",sans-serif;
      font-size:68px;
      line-height:.92;
      letter-spacing:-3px;
      font-weight:800;
      color:var(--ink);
    }
    .tagline{
      text-transform:uppercase;
      letter-spacing:3px;
      font-size:14px;
      font-weight:800;
      color:var(--muted);
      padding-left:3px;
    }
    .inverse .wordmark{color:var(--white)}
    .inverse .tagline{color:rgba(255,255,255,.74)}
    .inverse-chip{
      padding:24px 30px;
      border-radius:32px;
      background:linear-gradient(180deg,#0a1525 0%, #08111d 100%);
      box-shadow:0 24px 64px rgba(0,0,0,.22);
    }
    .icon-only{
      width:220px;
      height:220px;
      display:grid;
      place-items:center;
      padding:0;
    }
    .icon-only .icon{
      width:180px;
      height:180px;
      border-radius:46px;
    }
    .icon-only .icon::before{
      inset:18px;
      border-radius:32px;
    }
    .icon-only .icon svg{
      width:74px;
      height:74px;
    }
  </style>
</head>
<body>
  <section class="artboard" id="logo-horizontal-light">
    <div class="lockup">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M7 5.2L18.2 12L7 18.8V5.2Z" fill="white"/>
        </svg>
      </div>
      <div class="text">
        <div class="wordmark">produ</div>
        <div class="tagline">gestión de productoras</div>
      </div>
    </div>
  </section>

  <section class="artboard inverse-chip" id="logo-horizontal-dark">
    <div class="lockup inverse">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M7 5.2L18.2 12L7 18.8V5.2Z" fill="white"/>
        </svg>
      </div>
      <div class="text">
        <div class="wordmark">produ</div>
        <div class="tagline">gestión de productoras</div>
      </div>
    </div>
  </section>

  <section class="artboard icon-only" id="logo-icon">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M7 5.2L18.2 12L7 18.8V5.2Z" fill="white"/>
      </svg>
    </div>
  </section>
</body>
</html>
